# Phase 1 検証用スタック: AnythingLLM(公式イメージ) + ホスト Ollama。
#
# vLLM 0.24.0 は WSL2 で UVA 非対応のためフォールバック。
# ホスト Ollama (root PID, 127.0.0.1:11434) には network_mode:host で到達。
# 利用モデル:
#   LLM       : hf.co/mmnga-o/llm-jp-4-8b-thinking-gguf:Q4_K_M  (5.3GB Q4_K_M)
#   Embedding : mxbai-embed-large:latest                           (334MB F16)
#
# AnythingLLM Embedding を Ollama に切り替える場合は UI Settings > Embedder > Ollama で設定。
# Phase 2 以降: Docker DNS 修正 → カスタムビルド → vLLM + llm-jp(FP8) に戻す。
services:
  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: anythingllm
    # host ネットワーク: ホストの 127.0.0.1:11434(Ollama) に直接アクセス可能になる。
    # ports 指定不要（コンテナはホストネットワークを共有、http://localhost:3001 でアクセス）。
    network_mode: host
    cap_add:
      - SYS_ADMIN
    environment:
      - STORAGE_DIR=/app/server/storage
      # Phase1 既定: Telemetry OFF（顧客配布制約の先取り）
      - DISABLE_TELEMETRY=true
      # LLM: ホスト Ollama (network_mode:host で 127.0.0.1 到達可)
      # 現在: llama3.1:8b で Phase1 RAG パイプライン疎通確認済み（~90秒/クエリ）。
      # llm-jp-4-8b-thinking に戻す場合: OLLAMA_MODEL_PREF と TOKEN_LIMIT を変更し、
      #   OLLAMA_RESPONSE_TIMEOUT=1200000 (20分) も設定すること（thinking で 3分+かかるため）。
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_PATH=http://127.0.0.1:11434
      - OLLAMA_MODEL_PREF=llama3.1:8b
      - OLLAMA_MODEL_TOKEN_LIMIT=8192
      # llm-jp-4-8b-thinking 用タイムアウト(20分)。thinking モデル切り替え時に有効化:
      # - OLLAMA_RESPONSE_TIMEOUT=1200000
      # Embedding: mxbai-embed-large (多言語対応, F16, 334MB) を Ollama 経由で使用
      # mxbai-embed-large の最大入力は 512 tokens → チャンクを 500 chars に設定
      - EMBEDDING_ENGINE=ollama
      - EMBEDDING_BASE_PATH=http://127.0.0.1:11434
      - EMBEDDING_MODEL_PREF=mxbai-embed-large:latest
      - EMBEDDING_MODEL_MAX_CHUNK_LENGTH=500
    volumes:
      - ./anythingllm-storage:/app/server/storage
    restart: unless-stopped

# --- Ollama Docker サービス (ホスト Ollama が稼働中のため不要) ---
# ホスト Ollama: root プロセス PID 2293 (127.0.0.1:11434), 起動日 Jun29。
# 再起動が必要になった場合: sudo OLLAMA_HOST=0.0.0.0 ollama serve (0.0.0.0 バインドで他サービスからも到達可)

