# 配布用スタック: AnythingLLM + Ollama (Docker サービス)
#
# 起動: docker compose up -d
# 初回モデルダウンロード:
#   docker compose exec ollama ollama pull llama3.1:8b
#   docker compose exec ollama ollama pull mxbai-embed-large:latest
#
# ホスト Ollama (127.0.0.1:11434) が起動中の場合は停止してから本 compose を使うこと。
# 開発環境で共存する場合: Docker Ollama は ports: "11435:11434" で別ポートに出す。

networks:
  rag-internal:
    # LLM/embedding/vectorDB の内部通信。外部公開しない。
    internal: true
  rag-public:
    # AnythingLLM の UI ポート (3001) だけ外部に出す。

services:
  ollama:
    image: ollama/ollama:latest
    pull_policy: never
    container_name: rag-ollama
    networks:
      - rag-internal
    # 開発環境でホスト Ollama (11434) と共存する場合は下行を有効化:
    # ports:
    #   - "11435:11434"
    environment:
      # モデルを一定時間後にVRAMからアンロードしない (デフォルト5分でアンロードされ次リクエストが遅い)
      - OLLAMA_KEEP_ALIVE=24h
      # 同時リクエスト処理数 (デフォルト1=直列。ユーザー数に合わせて調整)
      - OLLAMA_NUM_PARALLEL=4
      # HuggingFace Hub へのアクセスを禁止 (セキュリティ: モデルコードのリモートDL防止)
      - HF_HUB_OFFLINE=1
    volumes:
      - ./ollama-models:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  anythingllm:
    # localRAG 改修版 (外部LLM provider allowlist 等) をソースからビルドしたカスタム image。
    # ビルド: cd anything-llm && docker build --network=host -t localrag-anythingllm:1.0.2 -f docker/Dockerfile .
    # (WSL2のDNS不調時は --add-host=github.com:<IP> 等を追加。docs/HANDOFF.md [B3]参照)
    image: localrag-anythingllm:1.0.2
    pull_policy: never
    container_name: anythingllm
    networks:
      - rag-internal
      - rag-public
    ports:
      - "3001:3001"
    cap_add:
      - SYS_ADMIN
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - STORAGE_DIR=/app/server/storage
      # === セキュリティ既定値 (顧客配布制約 / OFFLINE_DISTRIBUTION_HARDENING_PLAN §6) ===
      # Telemetry OFF
      - DISABLE_TELEMETRY=true
      # Swagger API ドキュメント (/api/docs) を無効化 (攻撃面の縮小)
      - DISABLE_SWAGGER_DOCS=true
      # ワークスペース誤削除防止 (顧客文書・ベクターの保護)
      - WORKSPACE_DELETION_PROTECTION=1
      # --- 以下は「意図的に未設定」で無効化される項目 (値を設定しないこと) ---
      # COMMUNITY_HUB_BUNDLE_DOWNLOADS_ENABLED:
      #   未設定 = Community Hub からの bundle/Agent Skill DL を完全拒否 (422)。
      #   "false" 等を設定すると逆に verified public アイテムのDLを許可してしまうため設定禁止。
      #   (参照: server/utils/middleware/communityHubDownloadsEnabled.js)
      # AGENT_*_API_KEY (SerpAPI, Tavily, Bing 等の外部 Web 検索):
      #   未設定 = 外部 Web 検索 Agent は API キーが無く機能しない (外部通信が発生しない)。
      # LLM: Docker 内部ネットワーク経由で Ollama に接続
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_PATH=http://ollama:11434
      - OLLAMA_MODEL_PREF=hf.co/mmnga-o/llm-jp-4-8b-thinking-gguf:Q4_K_M
      - OLLAMA_MODEL_TOKEN_LIMIT=8192
      # llm-jp-4-8b-thinking 用タイムアウト(20分)。2026-07-04: GPU(RTX 5070 Ti)ではウォーム時1〜7秒で応答することを
      # 生Ollama呼び出しで確認したが、RAGコンテキスト付きの長いプロンプトでの余裕を見て有効化しておく。
      - OLLAMA_RESPONSE_TIMEOUT=1200000
      # Embedding: mxbai-embed-large (多言語対応, F16, 334MB) を Ollama 経由で使用
      # mxbai-embed-large の最大入力は 512 tokens → チャンクを 500 chars に設定
      - EMBEDDING_ENGINE=ollama
      - EMBEDDING_BASE_PATH=http://ollama:11434
      - EMBEDDING_MODEL_PREF=mxbai-embed-large:latest
      - EMBEDDING_MODEL_MAX_CHUNK_LENGTH=500
    volumes:
      - ./anythingllm-storage:/app/server/storage
    restart: unless-stopped

