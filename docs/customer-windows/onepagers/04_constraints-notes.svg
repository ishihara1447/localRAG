<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="使う前に知っておくこと">
  <defs>
    <style>
      .jp { font-family: 'Yu Gothic UI','Yu Gothic','Meiryo','Noto Sans CJK JP',sans-serif; }
      .mono { font-family: 'Cascadia Mono','Consolas','Yu Gothic UI',monospace; }
      .title { font-size:42px;font-weight:800;fill:#18324a; }
      .subtitle { font-size:20px;font-weight:650;fill:#526173; }
      .h2 { font-size:24px;font-weight:800;fill:#18324a; }
      .h3 { font-size:20px;font-weight:800;fill:#18324a; }
      .body { font-size:17px;font-weight:650;fill:#172033; }
      .small { font-size:14px;font-weight:650;fill:#526173; }
      .tiny { font-size:12px;font-weight:650;fill:#526173; }
      .monoText { font-size:16px;font-weight:700;fill:#172033; }
      .white { fill:#fff; }
      .shadow { filter: drop-shadow(0 8px 18px rgba(24,50,74,.12)); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2563eb"/></marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#10b981"/></marker>
  </defs>
  <rect width="1600" height="900" fill="#f7fafc"/>
  <rect width="1600" height="98" fill="#fff"/><rect y="96" width="1600" height="2" fill="#dbeafe"/>
  <text class="jp title" x="54" y="58">使う前に知っておくこと</text>
  <text class="jp subtitle" x="56" y="86">制約と安全のしくみ</text>
  <text class="jp small" x="1450" y="58" text-anchor="end">LocalRAG v1.1.0</text>
  <text class="jp tiny" x="1450" y="80" text-anchor="end">所内文書AI検索システム</text>  <rect class="shadow" x="70" y="150" width="430" height="610" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text class="jp h2" x="100" y="200" text-anchor="start">① 動作の制約</text>
  <rect class="shadow" x="555" y="150" width="430" height="610" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text class="jp h2" x="585" y="200" text-anchor="start">② 変更しないこと</text>
  <rect class="shadow" x="1040" y="150" width="430" height="610" rx="8" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text class="jp h2" x="1070" y="200" text-anchor="start">③ 外部に出ない理由</text>
  <text class="jp body" x="105" y="255" text-anchor="start">GPU必須</text>
  <text class="jp body" x="105" y="289" text-anchor="start">NVIDIA VRAM 16GB以上</text>
  <text class="jp body" x="105" y="323" text-anchor="start">RTX 5070 Ti相当</text>
  <text class="jp body" x="105" y="357" text-anchor="start">不足PCでは動作しない</text>
  <text class="jp body" x="105" y="391" text-anchor="start">1台にインストール</text>
  <text class="jp body" x="105" y="425" text-anchor="start">難問は数分かかる場合あり</text>
  <text class="jp body" x="105" y="459" text-anchor="start">他ソフトのGPU使用で遅くなる</text>
  <text class="jp body" x="105" y="493" text-anchor="start">スキャン画像PDFは不可の場合あり</text>
  <rect x="115" y="346" width="165" height="36" rx="18" fill="#fee2e2"/><text class="jp h3" x="197.5" y="370" text-anchor="middle" fill="#dc2626">購入判断の分かれ目</text>
  <text class="jp body" x="590" y="255" text-anchor="start">Expand-Archive を使わない</text>
  <text class="jp body" x="590" y="289" text-anchor="start">tar.exe かエクスプローラー展開</text>
  <text class="jp body" x="590" y="323" text-anchor="start">同梱ソフトを勝手に更新しない</text>
  <text class="jp body" x="590" y="357" text-anchor="start">versions.lock の固定構成</text>
  <text class="jp body" x="590" y="391" text-anchor="start">データ用フォルダを移動・削除しない</text>
  <text class="jp body" x="590" y="425" text-anchor="start">LICENSES / NOTICE を削除しない</text>
  <text class="jp body" x="590" y="459" text-anchor="start">8888 / 11435 は内部用</text>
  <text class="jp body" x="590" y="493" text-anchor="start">3001 は変更可</text>
  <text class="jp body" x="1075" y="255" text-anchor="start">AI処理はすべてPC内</text>
  <text class="jp body" x="1075" y="289" text-anchor="start">Qwen3-8B / bge-m3</text>
  <text class="jp body" x="1075" y="323" text-anchor="start">Ollama: 127.0.0.1:11435</text>
  <text class="jp body" x="1075" y="357" text-anchor="start">外部AIはAPI許可リストで遮断</text>
  <text class="jp body" x="1075" y="391" text-anchor="start">Telemetry / Swagger は無効</text>
  <text class="jp body" x="1075" y="425" text-anchor="start">実行時のモデル外部取得なし</text>
  <text class="jp body" x="1075" y="459" text-anchor="start">LANを抜いても通常どおり動く</text>
  <text class="jp body" x="1075" y="493" text-anchor="start">BitLocker等の暗号化を推奨</text>
  <rect x="1095" y="461" width="225" height="36" rx="18" fill="#dcfce7"/><text class="jp h3" x="1207.5" y="485" text-anchor="middle" fill="#10b981">最大の売り: 外部に出ない</text>
  <line x1="1010" y1="425" x2="1470" y2="425" stroke="#10b981" stroke-width="4" stroke-dasharray="10 8"/><rect x="450" y="785" width="700" height="58" rx="8" fill="#18324a"/><text class="jp white" x="800" y="822" font-size="22" font-weight="800" text-anchor="middle">安全性は「PC内完結」と「外部AI遮断」を実機で確認できる</text>
</svg>
