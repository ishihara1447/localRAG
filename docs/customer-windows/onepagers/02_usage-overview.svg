<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="毎日の使い方はこれだけ">
  <defs>
    <style>
      .jp { font-family: 'Yu Gothic UI','Yu Gothic','Meiryo','Noto Sans CJK JP',sans-serif; }
      .mono { font-family: 'Cascadia Mono','Consolas','Yu Gothic UI',monospace; }
      .title { font-size:42px;font-weight:800;fill:#17324a; }
      .subtitle { font-size:20px;font-weight:650;fill:#5b6778; }
      .h2 { font-size:23px;font-weight:800;fill:#17324a; }
      .h3 { font-size:20px;font-weight:800;fill:#17324a; }
      .body { font-size:17px;font-weight:650;fill:#172033; }
      .small { font-size:14px;font-weight:650;fill:#5b6778; }
      .tiny { font-size:12px;font-weight:650;fill:#5b6778; }
      .monoText { font-size:15px;font-weight:700;fill:#172033; }
      .white { fill:#fff; }
      .card { fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:8; }
      .softBlue { fill:#eff6ff;stroke:#bfdbfe;stroke-width:1.5;rx:8; }
      .softGreen { fill:#ecfdf5;stroke:#bbf7d0;stroke-width:1.5;rx:8; }
      .softAmber { fill:#fffbeb;stroke:#fde68a;stroke-width:1.5;rx:8; }
      .softRed { fill:#fff1f2;stroke:#fecdd3;stroke-width:1.5;rx:8; }
      .shadow { filter: drop-shadow(0 9px 18px rgba(23,50,74,.11)); }
      .icon { fill:none;stroke:#2563eb;stroke-width:6;stroke-linecap:round;stroke-linejoin:round; }
      .iconG { fill:none;stroke:#10b981;stroke-width:6;stroke-linecap:round;stroke-linejoin:round; }
      .iconA { fill:none;stroke:#f59e0b;stroke-width:6;stroke-linecap:round;stroke-linejoin:round; }
      .iconR { fill:none;stroke:#dc2626;stroke-width:6;stroke-linecap:round;stroke-linejoin:round; }
      .chipBlue { fill:#dbeafe; }
      .chipGreen { fill:#dcfce7; }
      .chipAmber { fill:#fef3c7; }
      .chipRed { fill:#fee2e2; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2563eb"/></marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#10b981"/></marker>
  </defs>
  <rect width="1600" height="900" fill="#f7fafc"/>
  <rect width="1600" height="104" fill="#fff"/><rect y="102" width="1600" height="2" fill="#dbeafe"/>
  <text class="jp title" x="64" y="59">毎日の使い方はこれだけ</text>
  <text class="jp subtitle" x="66" y="88">起動不要・ブラウザで開くだけ・所内で完結</text>
  <text class="jp small" x="1536" y="58" text-anchor="end">OTE-RAG v1.2.0</text>
  <text class="jp tiny" x="1536" y="80" text-anchor="end">所内文書AI検索システム</text>

  <rect class="shadow card" x="520" y="156" width="560" height="560"/>
  <rect x="620" y="220" width="360" height="230" rx="16" fill="#1f2937"/>
  <rect x="648" y="250" width="304" height="156" rx="8" fill="#ffffff"/>
  <rect x="720" y="464" width="160" height="18" rx="9" fill="#475569"/>
  <g class="iconG" transform="translate(682 282)"><path d="M6 52V10h36l18 18v44H6z"/><path d="M42 10v18h18"/><path d="M18 46h30M18 60h22"/></g>
  <text class="jp h3" x="762" y="309">就業規則.pdf</text>
  <text class="jp body" x="682" y="360">Q. 有給休暇は？</text>
  <text class="jp body" x="682" y="391">A. 年22日です。</text>
  <rect x="668" y="508" width="264" height="48" rx="24" class="chipGreen"/>
  <text class="jp h3" x="800" y="539" text-anchor="middle" fill="#047857">出典付きで回答</text>
  <g class="icon" transform="translate(724 584)"><circle cx="38" cy="22" r="18"/><path d="M38 42v42M16 60h44"/><path d="M78 22h72M78 50h116M78 78h84"/></g>
  <text class="jp h2" x="800" y="690" text-anchor="middle">利用者はブラウザで質問するだけ</text>

  <rect class="shadow softBlue" x="64" y="170" width="380" height="168"/>
  <g class="icon" transform="translate(96 216)"><path d="M10 28h64M42 2v52"/><circle cx="42" cy="28" r="26"/></g>
  <text class="jp h3" x="182" y="224">1. PCの電源を入れる</text>
  <text class="jp body" x="182" y="258">3サービスが自動起動</text>
  <text class="jp body" x="182" y="290">日常の起動操作は不要</text>
  <line x1="444" y1="254" x2="548" y2="254" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>

  <rect class="shadow softBlue" x="1156" y="170" width="380" height="168"/>
  <g class="icon" transform="translate(1190 214)"><rect x="0" y="0" width="70" height="50" rx="6"/><path d="M0 16h70M16 34h38"/></g>
  <text class="jp h3" x="1280" y="224">2. ブラウザで開く</text>
  <text class="jp body" x="1280" y="258">同じPCの Edge 等</text>
  <text class="jp body" x="1280" y="290">http://localhost:3001</text>
  <line x1="1156" y1="254" x2="1052" y2="254" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>

  <rect class="shadow softBlue" x="1156" y="534" width="380" height="168"/>
  <g class="icon" transform="translate(1192 578)"><path d="M4 8h76v48H30L12 74V56H4z"/><path d="M22 28h40M22 42h24"/></g>
  <text class="jp h3" x="1280" y="588">3. 日本語で質問</text>
  <text class="jp body" x="1280" y="622">ワークスペースを選ぶ</text>
  <text class="jp body" x="1280" y="654">文書に基づいて回答</text>
  <line x1="1156" y1="618" x2="1050" y2="618" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>

  <rect class="shadow softGreen" x="64" y="534" width="380" height="168"/>
  <g class="iconG" transform="translate(98 578)"><circle cx="34" cy="34" r="30"/><path d="M18 36l12 12l24-30"/></g>
  <text class="jp h3" x="182" y="588">4. 外部に送らない</text>
  <text class="jp body" x="182" y="622">文書・質問はPC内</text>
  <text class="jp body" x="182" y="654">クラウドAIは使わない</text>
  <line x1="444" y1="618" x2="548" y2="618" stroke="#10b981" stroke-width="5" marker-end="url(#arrowG)"/>

  <rect class="shadow card" x="164" y="764" width="338" height="72"/><g class="iconG" transform="translate(194 784)"><path d="M4 24l13 13l30-30"/></g><text class="jp body" x="262" y="810">データは外部に出ない</text>
  <rect class="shadow card" x="631" y="764" width="338" height="72"/><g class="icon" transform="translate(661 782)"><path d="M6 8h44v46H6z"/><path d="M16 23h24M16 37h18"/></g><text class="jp body" x="729" y="810">回答には出典が付く</text>
  <rect class="shadow card" x="1098" y="764" width="338" height="72"/><g class="iconA" transform="translate(1128 782)"><circle cx="26" cy="26" r="22"/><path d="M26 14v16M26 40v2"/></g><text class="jp body" x="1196" y="810">文書に無いことは不明</text>
</svg>
