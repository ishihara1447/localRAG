  <rect x="625" y="300" width="350" height="220" rx="12" fill="#1e293b"/><rect x="645" y="320" width="310" height="165" rx="6" fill="#fff"/><rect x="705" y="520" width="190" height="20" rx="10" fill="#475569"/>
  <text class="jp body" x="670" y="355" text-anchor="start">LocalRAG</text>
  <text class="jp body" x="670" y="380" text-anchor="start">Q. 就業規則の有給休暇は？</text>
  <text class="jp body" x="670" y="405" text-anchor="start">A. 年22日です。</text>
  <text class="jp body" x="670" y="430" text-anchor="start">出典: 就業規則.pdf</text>
