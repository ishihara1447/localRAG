<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="文書を取り込んで質問する">
  <defs>
    <style>
      .jp { font-family: 'Yu Gothic UI','Yu Gothic','Meiryo','Noto Sans CJK JP',sans-serif; }
      .mono { font-family: 'Cascadia Mono','Consolas','Yu Gothic UI',monospace; }
      .title { font-size:42px;font-weight:800;fill:#17324a; }
      .subtitle { font-size:20px;font-weight:650;fill:#5b6778; }
      .h2 { font-size:23px;font-weight:800;fill:#17324a; }
      .h3 { font-size:20px;font-weight:800;fill:#17324a; }
      .body { font-size:17px;font-weight:650;fill:#172033; }
      .small { font-size:14px;font-weight:650;fill:#5b6778; }
      .tiny { font-size:12px;font-weight:650;fill:#5b6778; }
      .monoText { font-size:15px;font-weight:700;fill:#172033; }
      .white { fill:#fff; }
      .card { fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:8; }
      .softBlue { fill:#eff6ff;stroke:#bfdbfe;stroke-width:1.5;rx:8; }
      .softGreen { fill:#ecfdf5;stroke:#bbf7d0;stroke-width:1.5;rx:8; }
      .softAmber { fill:#fffbeb;stroke:#fde68a;stroke-width:1.5;rx:8; }
      .softRed { fill:#fff1f2;stroke:#fecdd3;stroke-width:1.5;rx:8; }
      .shadow { filter: drop-shadow(0 9px 18px rgba(23,50,74,.11)); }
      .icon { fill:none;stroke:#2563eb;stroke-width:6;stroke-linecap:round;stroke-linejoin:round; }
      .iconG { fill:none;stroke:#10b981;stroke-width:6;stroke-linecap:round;stroke-linejoin:round; }
      .iconA { fill:none;stroke:#f59e0b;stroke-width:6;stroke-linecap:round;stroke-linejoin:round; }
      .iconR { fill:none;stroke:#dc2626;stroke-width:6;stroke-linecap:round;stroke-linejoin:round; }
      .chipBlue { fill:#dbeafe; }
      .chipGreen { fill:#dcfce7; }
      .chipAmber { fill:#fef3c7; }
      .chipRed { fill:#fee2e2; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2563eb"/></marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#10b981"/></marker>
  </defs>
  <rect width="1600" height="900" fill="#f7fafc"/>
  <rect width="1600" height="104" fill="#fff"/><rect y="102" width="1600" height="2" fill="#dbeafe"/>
  <text class="jp title" x="64" y="59">文書を取り込んで質問する</text>
  <text class="jp subtitle" x="66" y="88">アップロード → ワークスペースへ移動 → Save and Embed → 質問</text>
  <text class="jp small" x="1536" y="58" text-anchor="end">OTE-RAG v1.1.0</text>
  <text class="jp tiny" x="1536" y="80" text-anchor="end">所内文書AI検索システム</text>

  <g transform="translate(72 174)">
    <rect class="shadow card" width="260" height="340"/>
    <circle cx="130" cy="64" r="38" class="chipBlue"/><text class="jp h2" x="130" y="73" text-anchor="middle">1</text>
    <g class="icon" transform="translate(95 122)"><path d="M8 54V12h36l18 18v42H8z"/><path d="M44 12v18h18"/><path d="M20 50h30"/></g>
    <text class="jp h3" x="130" y="226" text-anchor="middle">文書を選ぶ</text>
    <text class="jp body" x="130" y="260" text-anchor="middle">PDF / DOCX / TXT</text>
    <text class="jp small" x="130" y="292" text-anchor="middle">スキャン画像のみは不可の場合あり</text>
  </g>
  <line x1="348" y1="344" x2="444" y2="344" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <g transform="translate(460 174)">
    <rect class="shadow card" width="260" height="340"/>
    <circle cx="130" cy="64" r="38" class="chipBlue"/><text class="jp h2" x="130" y="73" text-anchor="middle">2</text>
    <g class="icon" transform="translate(92 122)"><rect x="0" y="20" width="76" height="54" rx="8"/><path d="M38 2v46M18 22l20-20l20 20"/></g>
    <text class="jp h3" x="130" y="226" text-anchor="middle">アップロード</text>
    <text class="jp body" x="130" y="260" text-anchor="middle">ドラッグ&amp;ドロップ</text>
    <text class="jp small" x="130" y="292" text-anchor="middle">またはファイル選択</text>
  </g>
  <line x1="736" y1="344" x2="832" y2="344" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <g transform="translate(848 174)">
    <rect class="shadow card" width="260" height="340"/>
    <circle cx="130" cy="64" r="38" class="chipBlue"/><text class="jp h2" x="130" y="73" text-anchor="middle">3</text>
    <g class="icon" transform="translate(92 126)"><path d="M4 18h76v54H4z"/><path d="M4 18l28-18h48v18"/><path d="M20 42h42M20 58h28"/></g>
    <text class="jp h3" x="130" y="226" text-anchor="middle">Move to Workspace</text>
    <text class="jp body" x="130" y="260" text-anchor="middle">案件・分野別に整理</text>
    <text class="jp small" x="130" y="292" text-anchor="middle">取り込み先を明確にする</text>
  </g>
  <line x1="1124" y1="344" x2="1220" y2="344" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <g transform="translate(1236 174)">
    <rect class="shadow card" width="260" height="340"/>
    <circle cx="130" cy="64" r="38" class="chipGreen"/><text class="jp h2" x="130" y="73" text-anchor="middle">4</text>
    <g class="iconG" transform="translate(92 126)"><circle cx="38" cy="38" r="30"/><path d="M22 40l12 12l24-30"/></g>
    <text class="jp h3" x="130" y="226" text-anchor="middle">Save and Embed</text>
    <text class="jp body" x="130" y="260" text-anchor="middle">検索できる形へ変換</text>
    <text class="jp small" x="130" y="292" text-anchor="middle">数十秒〜数分</text>
  </g>

  <rect class="shadow softGreen" x="258" y="588" width="460" height="170"/>
  <g class="iconG" transform="translate(304 632)"><path d="M4 8h82v56H34L16 82V64H4z"/><path d="M22 28h42M22 44h28"/></g>
  <text class="jp h2" x="430" y="650">取り込み後に質問</text>
  <text class="jp body" x="430" y="690">回答は文書を根拠に生成</text>
  <text class="jp body" x="430" y="722">出典から該当箇所を確認</text>

  <rect class="shadow softAmber" x="882" y="588" width="460" height="170"/>
  <g class="iconA" transform="translate(928 632)"><circle cx="38" cy="38" r="30"/><path d="M38 20v22M38 56v2"/></g>
  <text class="jp h2" x="1054" y="650">注意</text>
  <text class="jp body" x="1054" y="690">大量文書は処理に時間がかかる</text>
  <text class="jp body" x="1054" y="722">未取り込み文書は回答対象外</text>

  <text class="jp tiny" x="64" y="874">外部AIへ送信しない / 出典付き回答 / 文書外は不明</text>
  <text class="jp tiny" x="1536" y="874" text-anchor="end">Qwen3-8B + bge-m3 / NVIDIA VRAM 16GB以上</text>
</svg>
