<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="文書を取り込んで質問する">
  <defs>
    <style>
      .jp { font-family: 'Yu Gothic UI','Yu Gothic','Meiryo','Noto Sans CJK JP',sans-serif; }
      .mono { font-family: 'Cascadia Mono','Consolas','Yu Gothic UI',monospace; }
      .title { font-size:42px;font-weight:800;fill:#18324a; }
      .subtitle { font-size:20px;font-weight:650;fill:#526173; }
      .h2 { font-size:24px;font-weight:800;fill:#18324a; }
      .h3 { font-size:20px;font-weight:800;fill:#18324a; }
      .body { font-size:17px;font-weight:650;fill:#172033; }
      .small { font-size:14px;font-weight:650;fill:#526173; }
      .tiny { font-size:12px;font-weight:650;fill:#526173; }
      .monoText { font-size:16px;font-weight:700;fill:#172033; }
      .white { fill:#fff; }
      .shadow { filter: drop-shadow(0 8px 18px rgba(24,50,74,.12)); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2563eb"/></marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#10b981"/></marker>
  </defs>
  <rect width="1600" height="900" fill="#f7fafc"/>
  <rect width="1600" height="98" fill="#fff"/><rect y="96" width="1600" height="2" fill="#dbeafe"/>
  <text class="jp title" x="54" y="58">文書を取り込んで質問する</text>
  <text class="jp subtitle" x="56" y="86">Save and Embed が取り込みの合図</text>
  <text class="jp small" x="1450" y="58" text-anchor="end">LocalRAG v1.1.0</text>
  <text class="jp tiny" x="1450" y="80" text-anchor="end">所内文書AI検索システム</text>  <rect x="290" y="190" width="1020" height="520" rx="26" fill="#ecfeff" stroke="#14b8a6" stroke-width="5"/>
  <rect class="shadow" x="115" y="250" width="230" height="150" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text class="jp h3" x="150" y="300" text-anchor="start">PDF</text>
  <text class="jp h3" x="150" y="335" text-anchor="start">Word(.docx)</text>
  <text class="jp h3" x="150" y="370" text-anchor="start">テキスト(.txt)</text>
  <line x1="350" y1="325" x2="510" y2="325" stroke="#2563eb" stroke-width="6" marker-end="url(#arrow)"/>
  <rect class="shadow" x="520" y="250" width="240" height="150" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text class="jp body" x="560" y="300" text-anchor="start">ワークスペース</text>
  <text class="jp body" x="560" y="330" text-anchor="start">案件別・分野別</text>
  <text class="jp body" x="560" y="360" text-anchor="start">文書をまとめる箱</text>
  <line x1="765" y1="325" x2="900" y2="325" stroke="#2563eb" stroke-width="6" marker-end="url(#arrow)"/>
  <rect class="shadow" x="910" y="250" width="220" height="150" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <circle cx="1020" cy="310" r="38" fill="#dcfce7" stroke="#bfdbfe"/><text class="jp h2" x="1020" y="319" text-anchor="middle">変</text>
  <text class="jp body" x="965" y="380" text-anchor="start">検索できる形へ変換</text>
  <line x1="1135" y1="325" x2="1260" y2="325" stroke="#2563eb" stroke-width="6" marker-end="url(#arrow)"/>
  <rect class="shadow" x="1270" y="240" width="250" height="170" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text class="jp body" x="1300" y="290" text-anchor="start">質問</text>
  <text class="jp body" x="1300" y="321" text-anchor="start">→ 出典タグ付き回答</text>
  <text class="jp body" x="1300" y="352" text-anchor="start">文書外は「不明」</text>
  <rect class="shadow" x="120" y="520" width="470" height="190" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text class="jp body" x="150" y="560" text-anchor="start">アップロード手順</text>
  <text class="jp body" x="150" y="589" text-anchor="start">1. ワークスペースを開く</text>
  <text class="jp body" x="150" y="618" text-anchor="start">2. 文書をドラッグ＆ドロップ</text>
  <text class="jp body" x="150" y="647" text-anchor="start">3. Move to Workspace</text>
  <text class="jp body" x="150" y="676" text-anchor="start">4. Save and Embed</text>
  <rect x="365" y="691" width="330" height="36" rx="18" fill="#dbeafe"/><text class="jp h3" x="530" y="715" text-anchor="middle" fill="#2563eb">Save and Embed で取り込む</text>
  <rect class="shadow" x="660" y="535" width="390" height="120" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text class="jp body" x="695" y="578" text-anchor="start">注意</text>
  <text class="jp body" x="695" y="607" text-anchor="start">スキャン画像だけのPDFは</text>
  <text class="jp body" x="695" y="636" text-anchor="start">読み取れない場合あり</text>
  <rect class="shadow" x="1110" y="520" width="390" height="145" rx="8" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text class="jp body" x="1145" y="565" text-anchor="start">回答の性質</text>
  <text class="jp body" x="1145" y="597" text-anchor="start">出典付きで回答</text>
  <text class="jp body" x="1145" y="629" text-anchor="start">文書に無いことは「不明」</text>
  <text class="jp tiny" x="54" y="874">外部AIへ送信しない / 出典付き回答 / 文書外は不明</text><text class="jp tiny" x="1546" y="874" text-anchor="end">Qwen3-8B + bge-m3 / NVIDIA VRAM 16GB以上</text>
</svg>
