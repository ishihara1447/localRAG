<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="大切なデータを守る">
  <defs>
    <style>
      .jp { font-family: 'Yu Gothic UI','Yu Gothic','Meiryo','Noto Sans CJK JP',sans-serif; }
      .mono { font-family: 'Cascadia Mono','Consolas','Yu Gothic UI',monospace; }
      .title { font-size:42px;font-weight:800;fill:#18324a; }
      .subtitle { font-size:20px;font-weight:650;fill:#526173; }
      .h2 { font-size:24px;font-weight:800;fill:#18324a; }
      .h3 { font-size:20px;font-weight:800;fill:#18324a; }
      .body { font-size:17px;font-weight:650;fill:#172033; }
      .small { font-size:14px;font-weight:650;fill:#526173; }
      .tiny { font-size:12px;font-weight:650;fill:#526173; }
      .monoText { font-size:16px;font-weight:700;fill:#172033; }
      .white { fill:#fff; }
      .shadow { filter: drop-shadow(0 8px 18px rgba(24,50,74,.12)); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2563eb"/></marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#10b981"/></marker>
  </defs>
  <rect width="1600" height="900" fill="#f7fafc"/>
  <rect width="1600" height="98" fill="#fff"/><rect y="96" width="1600" height="2" fill="#dbeafe"/>
  <text class="jp title" x="54" y="58">大切なデータを守る</text>
  <text class="jp subtitle" x="56" y="86">週1バックアップ＋外部媒体にコピー</text>
  <text class="jp small" x="1450" y="58" text-anchor="end">LocalRAG v1.1.0</text>
  <text class="jp tiny" x="1450" y="80" text-anchor="end">所内文書AI検索システム</text>  <rect class="shadow" x="180" y="260" width="300" height="190" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text class="jp body" x="230" y="320" text-anchor="start">文書</text>
  <text class="jp body" x="230" y="352" text-anchor="start">履歴</text>
  <text class="jp body" x="230" y="384" text-anchor="start">検索データ</text>
  <text class="jp body" x="230" y="416" text-anchor="start">設定</text>
  <line x1="490" y1="355" x2="680" y2="355" stroke="#10b981" stroke-width="7" marker-end="url(#arrowG)"/>
  <rect class="shadow" x="700" y="250" width="260" height="210" rx="8" fill="#ecfdf5" stroke="#bbf7d0"/>
  <circle cx="830" cy="310" r="38" fill="#dcfce7" stroke="#bfdbfe"/><text class="jp h2" x="830" y="319" text-anchor="middle">zip</text>
  <text class="jp body" x="760" y="390" text-anchor="start">バックアップzip</text>
  <text class="jp body" x="760" y="420" text-anchor="start">localrag-backup-&lt;日時&gt;.zip</text>
  <line x1="970" y1="355" x2="1150" y2="355" stroke="#10b981" stroke-width="7" marker-end="url(#arrowG)"/>
  <rect class="shadow" x="1170" y="260" width="270" height="190" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text class="jp body" x="1210" y="320" text-anchor="start">社内サーバー</text>
  <text class="jp body" x="1210" y="351" text-anchor="start">外付けディスク</text>
  <text class="jp body" x="1210" y="382" text-anchor="start">機密文書と同じ扱い</text>
  <path d="M1160 510 C980 630 760 630 600 510" fill="none" stroke="#94a3b8" stroke-width="5" marker-end="url(#arrow)" stroke-dasharray="10 8"/>
  <rect class="shadow" x="80" y="580" width="430" height="170" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text class="jp body" x="115" y="625" text-anchor="start">バックアップ</text>
  <text class="jp body" x="115" y="655" text-anchor="start">backup.ps1（管理者PowerShell）</text>
  <text class="jp body" x="115" y="685" text-anchor="start">週1回推奨・業務時間外に</text>
  <text class="jp body" x="115" y="715" text-anchor="start">実行中は数分利用不可</text>
  <rect class="shadow" x="585" y="590" width="430" height="135" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="jp body" x="620" y="635" text-anchor="start">保存先</text>
  <text class="jp body" x="620" y="665" text-anchor="start">C:\ProgramData\LocalRAG\backups</text>
  <text class="jp body" x="620" y="695" text-anchor="start">AIモデル本体は対象外</text>
  <rect class="shadow" x="1090" y="580" width="430" height="170" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text class="jp body" x="1125" y="625" text-anchor="start">復元</text>
  <text class="jp body" x="1125" y="655" text-anchor="start">restore.ps1 -BackupZip &lt;zip&gt;</text>
  <text class="jp body" x="1125" y="685" text-anchor="start">現在のデータは上書き</text>
  <text class="jp body" x="1125" y="715" text-anchor="start">実行前に相談推奨</text>
  <rect x="640" y="161" width="285" height="36" rx="18" fill="#dcfce7"/><text class="jp h3" x="782.5" y="185" text-anchor="middle" fill="#10b981">週1バックアップ＋外部媒体にコピー</text>
  <text class="jp tiny" x="54" y="874">外部AIへ送信しない / 出典付き回答 / 文書外は不明</text><text class="jp tiny" x="1546" y="874" text-anchor="end">Qwen3-8B + bge-m3 / NVIDIA VRAM 16GB以上</text>
</svg>
