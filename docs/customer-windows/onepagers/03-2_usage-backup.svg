<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="バックアップと復元">
  <defs>
    <style>
      .jp { font-family: 'Yu Gothic UI','Yu Gothic','Meiryo','Noto Sans CJK JP',sans-serif; }
      .mono { font-family: 'Cascadia Mono','Consolas','Yu Gothic UI',monospace; }
      .title { font-size:42px;font-weight:800;fill:#17324a; }
      .subtitle { font-size:20px;font-weight:650;fill:#5b6778; }
      .h2 { font-size:23px;font-weight:800;fill:#17324a; }
      .h3 { font-size:20px;font-weight:800;fill:#17324a; }
      .body { font-size:17px;font-weight:650;fill:#172033; }
      .small { font-size:14px;font-weight:650;fill:#5b6778; }
      .tiny { font-size:12px;font-weight:650;fill:#5b6778; }
      .monoText { font-size:15px;font-weight:700;fill:#172033; }
      .white { fill:#fff; }
      .card { fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:8; }
      .softBlue { fill:#eff6ff;stroke:#bfdbfe;stroke-width:1.5;rx:8; }
      .softGreen { fill:#ecfdf5;stroke:#bbf7d0;stroke-width:1.5;rx:8; }
      .softAmber { fill:#fffbeb;stroke:#fde68a;stroke-width:1.5;rx:8; }
      .softRed { fill:#fff1f2;stroke:#fecdd3;stroke-width:1.5;rx:8; }
      .shadow { filter: drop-shadow(0 9px 18px rgba(23,50,74,.11)); }
      .icon { fill:none;stroke:#2563eb;stroke-width:6;stroke-linecap:round;stroke-linejoin:round; }
      .iconG { fill:none;stroke:#10b981;stroke-width:6;stroke-linecap:round;stroke-linejoin:round; }
      .iconA { fill:none;stroke:#f59e0b;stroke-width:6;stroke-linecap:round;stroke-linejoin:round; }
      .iconR { fill:none;stroke:#dc2626;stroke-width:6;stroke-linecap:round;stroke-linejoin:round; }
      .chipBlue { fill:#dbeafe; }
      .chipGreen { fill:#dcfce7; }
      .chipAmber { fill:#fef3c7; }
      .chipRed { fill:#fee2e2; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2563eb"/></marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#10b981"/></marker>
  </defs>
  <rect width="1600" height="900" fill="#f7fafc"/>
  <rect width="1600" height="104" fill="#fff"/><rect y="102" width="1600" height="2" fill="#dbeafe"/>
  <text class="jp title" x="64" y="59">バックアップと復元</text>
  <text class="jp subtitle" x="66" y="88">文書・履歴・設定をzipで退避。モデル本体は配布パッケージから復元</text>
  <text class="jp small" x="1536" y="58" text-anchor="end">LocalRAG v1.1.0</text>
  <text class="jp tiny" x="1536" y="80" text-anchor="end">所内文書AI検索システム</text>

  <rect class="shadow card" x="84" y="160" width="390" height="430"/>
  <circle cx="279" cy="226" r="44" class="chipBlue"/><g class="icon" transform="translate(250 198)"><path d="M4 18h58v42H4z"/><path d="M18 18V6h30v12"/><path d="M18 42h30"/></g>
  <text class="jp h2" x="279" y="306" text-anchor="middle">1. バックアップ作成</text>
  <text class="jp body" x="279" y="350" text-anchor="middle">管理者PowerShell</text>
  <text class="mono monoText" x="279" y="386" text-anchor="middle">.\backup.ps1</text>
  <text class="jp body" x="279" y="424" text-anchor="middle">サービスを一時停止</text>
  <text class="jp body" x="279" y="456" text-anchor="middle">zip作成後に自動再開</text>
  <rect x="154" y="500" width="250" height="42" rx="21" class="chipBlue"/><text class="jp small" x="279" y="527" text-anchor="middle">業務時間外の実行がおすすめ</text>

  <line x1="494" y1="375" x2="620" y2="375" stroke="#2563eb" stroke-width="6" marker-end="url(#arrow)"/>

  <rect class="shadow softGreen" x="640" y="160" width="320" height="430"/>
  <circle cx="800" cy="226" r="44" class="chipGreen"/><g class="iconG" transform="translate(770 198)"><path d="M6 20h58v54H6z"/><path d="M18 20l8-14h26l8 14"/><path d="M20 44h30M20 58h22"/></g>
  <text class="jp h2" x="800" y="306" text-anchor="middle">保存先</text>
  <text class="mono monoText" x="800" y="352" text-anchor="middle">C:\ProgramData</text>
  <text class="mono monoText" x="800" y="380" text-anchor="middle">\LocalRAG\backups</text>
  <text class="jp body" x="800" y="432" text-anchor="middle">外部媒体にもコピー</text>
  <text class="jp body" x="800" y="464" text-anchor="middle">機密文書として保管</text>

  <line x1="980" y1="375" x2="1106" y2="375" stroke="#10b981" stroke-width="6" marker-end="url(#arrowG)"/>

  <rect class="shadow card" x="1126" y="160" width="390" height="430"/>
  <circle cx="1321" cy="226" r="44" class="chipAmber"/><g class="iconA" transform="translate(1292 196)"><path d="M30 4v48"/><path d="M12 34l18 18l18-18"/><path d="M4 68h52"/></g>
  <text class="jp h2" x="1321" y="306" text-anchor="middle">2. 復元</text>
  <text class="jp body" x="1321" y="350" text-anchor="middle">現在データを上書き</text>
  <text class="mono monoText" x="1321" y="386" text-anchor="middle">.\restore.ps1 -BackupZip ...</text>
  <text class="jp body" x="1321" y="424" text-anchor="middle">実行前に相談推奨</text>
  <text class="jp body" x="1321" y="456" text-anchor="middle">サービス停止・再開は自動</text>
  <rect x="1202" y="500" width="238" height="42" rx="21" class="chipAmber"/><text class="jp small" x="1321" y="527" text-anchor="middle">復元は慎重に</text>

  <rect class="shadow softBlue" x="180" y="660" width="520" height="112"/>
  <g class="icon" transform="translate(220 692)"><path d="M4 10h60v46H4z"/><path d="M18 10V2h32v8"/><path d="M18 34h32"/></g>
  <text class="jp h2" x="320" y="708">含まれるもの</text>
  <text class="jp body" x="320" y="742">文書・履歴・設定・検索用データ</text>
  <rect class="shadow softRed" x="900" y="660" width="520" height="112"/>
  <g class="iconR" transform="translate(940 692)"><circle cx="34" cy="34" r="30"/><path d="M18 18l32 32M50 18L18 50"/></g>
  <text class="jp h2" x="1040" y="708">含まれないもの</text>
  <text class="jp body" x="1040" y="742">AIモデル本体・実行バイナリ</text>

  <text class="jp tiny" x="64" y="874">バックアップzipも機密情報として扱う</text>
  <text class="jp tiny" x="1536" y="874" text-anchor="end">週1回程度の定期実行を推奨</text>
</svg>
