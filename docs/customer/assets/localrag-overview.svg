<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1130" viewBox="0 0 1600 1130" font-family="Noto Sans CJK JP, sans-serif">
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2740"/>
      <stop offset="1" stop-color="#155084"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2c6fb0"/>
    </marker>
    <marker id="arrowG" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#a9862f"/>
    </marker>
    <marker id="arrowS" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8895a5"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1600" height="1130" fill="#eef2f7"/>

  <!-- ============ HEADER ============ -->
  <rect x="0" y="0" width="1600" height="122" fill="url(#header)"/>
  <text x="48" y="62" fill="#ffffff" font-size="46" font-weight="700">LocalRAG</text>
  <text x="48" y="98" fill="#c7dced" font-size="24">社内文書のための 完全ローカル 日本語 RAG システム</text>
  <g>
    <rect x="1116" y="34" width="200" height="54" rx="27" fill="#1f9d76"/>
    <text x="1216" y="68" fill="#ffffff" font-size="21" font-weight="700" text-anchor="middle">オフライン動作</text>
    <rect x="1332" y="34" width="220" height="54" rx="27" fill="#1f9d76"/>
    <text x="1442" y="68" fill="#ffffff" font-size="21" font-weight="700" text-anchor="middle">外部送信なし</text>
  </g>

  <!-- ============ 概要 ============ -->
  <rect x="40" y="146" width="1520" height="112" rx="12" fill="#ffffff" stroke="#d5dee8"/>
  <rect x="40" y="146" width="8" height="112" rx="4" fill="#2c6fb0"/>
  <text x="70" y="184" fill="#1b2a3a" font-size="26" font-weight="700">概要</text>
  <text x="70" y="220" fill="#33465a" font-size="21">AnythingLLM（OSS）をベースに構築した、社内文書の Q&amp;A に特化した日本語 RAG システムです。アップロードした</text>
  <text x="70" y="248" fill="#33465a" font-size="21">文書だけを根拠に、出典付きで回答します。推論・ベクトル化はすべて自社環境内で完結し、文書は外部へ送信されません。</text>

  <!-- ============ 概要図 ============ -->
  <rect x="40" y="278" width="1000" height="560" rx="12" fill="#ffffff" stroke="#d5dee8"/>
  <rect x="40" y="278" width="8" height="560" rx="4" fill="#1f9d76"/>
  <text x="70" y="316" fill="#1b2a3a" font-size="26" font-weight="700">概要図（システム構成）</text>

  <!-- 顧客環境 boundary (閉じた環境) -->
  <rect x="90" y="340" width="900" height="470" rx="10" fill="#f2f8f4" stroke="#1f9d76" stroke-width="2.5"/>
  <text x="112" y="372" fill="#1f7d5c" font-size="19" font-weight="700">顧客環境（社内ネットワーク・インターネット接続不要）</text>
  <!-- badge: 外部通信なし -->
  <rect x="774" y="350" width="196" height="42" rx="21" fill="#1f9d76"/>
  <polyline points="794,371 802,381 818,359" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="832" y="378" fill="#ffffff" font-size="19" font-weight="700">外部通信なし</text>

  <!-- Windows/WSL2/Docker host -->
  <rect x="180" y="406" width="720" height="250" rx="8" fill="#eef3f9" stroke="#94accb" stroke-width="2"/>
  <text x="200" y="432" fill="#2c4a6e" font-size="17" font-weight="700">Windows 11 + WSL2（Ubuntu）＋ Docker Engine ／ Linux サーバー</text>

  <!-- service: AnythingLLM -->
  <rect x="220" y="456" width="300" height="178" rx="8" fill="#ffffff" stroke="#2c6fb0" stroke-width="2"/>
  <text x="370" y="496" fill="#1b2a3a" font-size="21" font-weight="700" text-anchor="middle">AnythingLLM</text>
  <text x="370" y="528" fill="#4a5b6d" font-size="16" text-anchor="middle">チャット UI</text>
  <text x="370" y="554" fill="#4a5b6d" font-size="16" text-anchor="middle">文書管理・RAG 制御</text>
  <text x="370" y="602" fill="#2c6fb0" font-size="15" font-weight="700" text-anchor="middle">LanceDB（ベクトルDB）内蔵</text>

  <!-- service: Ollama -->
  <rect x="560" y="456" width="300" height="178" rx="8" fill="#ffffff" stroke="#b8631f" stroke-width="2"/>
  <text x="710" y="496" fill="#1b2a3a" font-size="21" font-weight="700" text-anchor="middle">Ollama</text>
  <text x="710" y="528" fill="#4a5b6d" font-size="16" text-anchor="middle">LLM 推論</text>
  <text x="710" y="554" fill="#4a5b6d" font-size="16" text-anchor="middle">Embedding 生成</text>
  <text x="710" y="602" fill="#b8631f" font-size="15" font-weight="700" text-anchor="middle">GPU アクセラレーション</text>

  <!-- AnythingLLM <-> Ollama double arrow -->
  <line x1="520" y1="534" x2="560" y2="534" stroke="#8895a5" stroke-width="2.5" marker-end="url(#arrowS)"/>
  <line x1="560" y1="560" x2="520" y2="560" stroke="#8895a5" stroke-width="2.5" marker-end="url(#arrowS)"/>

  <!-- 利用者 -->
  <rect x="220" y="690" width="300" height="78" rx="8" fill="#ffffff" stroke="#5b6b7b" stroke-width="2"/>
  <text x="370" y="726" fill="#1b2a3a" font-size="19" font-weight="700" text-anchor="middle">利用者（Web ブラウザ）</text>
  <text x="370" y="751" fill="#4a5b6d" font-size="15" text-anchor="middle">http://localhost:3001</text>

  <!-- 社内文書 -->
  <rect x="560" y="690" width="300" height="78" rx="8" fill="#fbf7ee" stroke="#c9a94a" stroke-width="2"/>
  <text x="710" y="722" fill="#1b2a3a" font-size="18" font-weight="700" text-anchor="middle">社内文書</text>
  <text x="710" y="748" fill="#8a7320" font-size="15" text-anchor="middle">PDF / DOCX / TXT</text>

  <!-- arrow 利用者 -> AnythingLLM -->
  <line x1="370" y1="690" x2="370" y2="636" stroke="#2c6fb0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="388" y="672" fill="#2c6fb0" font-size="14">質問／回答</text>
  <!-- arrow 社内文書 -> AnythingLLM -->
  <line x1="612" y1="690" x2="478" y2="636" stroke="#a9862f" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <text x="516" y="676" fill="#a9862f" font-size="14">アップロード</text>

  <!-- ============ 特徴 ============ -->
  <rect x="1060" y="278" width="500" height="560" rx="12" fill="#ffffff" stroke="#d5dee8"/>
  <rect x="1060" y="278" width="8" height="560" rx="4" fill="#b8631f"/>
  <text x="1090" y="316" fill="#1b2a3a" font-size="26" font-weight="700">特徴</text>
  <g font-size="19" fill="#26374a">
    <circle cx="1104" cy="360" r="7" fill="#1f9d76"/>
    <text x="1124" y="366" font-weight="700">完全ローカル／オフライン動作</text>
    <text x="1124" y="392" font-size="16" fill="#55677b">インターネット接続なしで導入・運用できる</text>

    <circle cx="1104" cy="430" r="7" fill="#1f9d76"/>
    <text x="1124" y="436" font-weight="700">顧客文書を外部に送信しない</text>
    <text x="1124" y="462" font-size="16" fill="#55677b">外部サービス連携を持たない完全ローカル構成</text>

    <circle cx="1104" cy="500" r="7" fill="#1f9d76"/>
    <text x="1124" y="506" font-weight="700">出典付き回答・ハルシネーション抑制</text>
    <text x="1124" y="532" font-size="16" fill="#55677b">文書に無い内容は「不明」と回答</text>

    <circle cx="1104" cy="570" r="7" fill="#1f9d76"/>
    <text x="1124" y="576" font-weight="700">日本語に対応</text>
    <text x="1124" y="602" font-size="16" fill="#55677b">日本語 LLM・日本語 Embedding を採用</text>

    <circle cx="1104" cy="640" r="7" fill="#1f9d76"/>
    <text x="1124" y="646" font-weight="700">GPU による高速推論</text>
    <text x="1124" y="672" font-size="16" fill="#55677b">NVIDIA GPU で実用的な応答速度</text>

    <circle cx="1104" cy="710" r="7" fill="#1f9d76"/>
    <text x="1124" y="716" font-weight="700">セキュアな既定設定</text>
    <text x="1124" y="742" font-size="16" fill="#55677b">テレメトリ・危険機能・外部連携を既定で無効化</text>

    <circle cx="1104" cy="780" r="7" fill="#1f9d76"/>
    <text x="1124" y="786" font-weight="700">配布パッケージの真正性検証</text>
    <text x="1124" y="812" font-size="16" fill="#55677b">チェックサムで改ざん・破損を検知</text>
  </g>

  <!-- ============ 動作環境 ============ -->
  <rect x="40" y="858" width="1520" height="234" rx="12" fill="#ffffff" stroke="#d5dee8"/>
  <rect x="40" y="858" width="8" height="234" rx="4" fill="#2c6fb0"/>
  <text x="70" y="896" fill="#1b2a3a" font-size="26" font-weight="700">動作環境</text>

  <text x="72" y="934" fill="#2c6fb0" font-size="19" font-weight="700">対応 OS</text>
  <text x="72" y="964" fill="#33465a" font-size="18">・Windows 11 ＋ WSL2（Ubuntu）</text>
  <text x="72" y="992" fill="#33465a" font-size="18">　＋ Docker Engine</text>
  <text x="72" y="1020" fill="#33465a" font-size="18">・Linux ＋ Docker Engine</text>
  <text x="72" y="1058" fill="#8493a3" font-size="15">※ Docker Desktop は不要（無償構成）</text>

  <text x="600" y="934" fill="#2c6fb0" font-size="19" font-weight="700">推奨ハードウェア</text>
  <text x="600" y="964" fill="#33465a" font-size="18">・NVIDIA GPU（VRAM 16GB 級）</text>
  <text x="600" y="992" fill="#33465a" font-size="18">・ディスク空き 30GB 以上（推奨 100GB）</text>
  <text x="600" y="1020" fill="#33465a" font-size="18">・メモリ 16GB 以上</text>
  <text x="600" y="1058" fill="#8493a3" font-size="15">※ GPU 無しでも動作（応答速度は低下）</text>

  <text x="1128" y="934" fill="#2c6fb0" font-size="19" font-weight="700">前提ソフトウェア</text>
  <text x="1128" y="964" fill="#33465a" font-size="18">・Docker Engine ＋ Compose v2</text>
  <text x="1128" y="992" fill="#33465a" font-size="18">・NVIDIA ドライバ</text>
  <text x="1128" y="1020" fill="#33465a" font-size="18">・nvidia-container-toolkit</text>
  <text x="1128" y="1058" fill="#8493a3" font-size="15">※ アクセス先：http://localhost:3001</text>

  <text x="1560" y="1116" fill="#98a6b5" font-size="14" text-anchor="end">LocalRAG — 完全ローカル日本語RAG（AnythingLLM ベース／MIT・Apache-2.0 等）</text>
</svg>
